<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#141110">
<meta name="description" content="Personal records, properly tracked.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Forge">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Forge</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #141110;
  --card: #1E1A17;
  --card-2: #272220;
  --border: #39312B;
  --border-strong: #4A4039;
  --text: #EDE6DE;
  --text-2: #9A8F84;
  --text-3: #6B625B;
  --pr: #FFB23E;
  --pr-glow: rgba(255, 178, 62, 0.35);
  --ember: #FF6A2B;
  --steel: #6FA8C7;
  --danger: #E5573F;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
  --font-display: 'Bricolage Grotesque', system-ui, sans-serif;
  --font-body: 'Manrope', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; min-height: 100%; background: var(--bg); }
body {
  font-family: var(--font-body);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  font-size: 16px;
  line-height: 1.5;
  overscroll-behavior-y: contain;
  font-feature-settings: "tnum" 1;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(255, 106, 43, 0.055), transparent 70%);
  pointer-events: none;
  z-index: -1;
}

#app {
  min-height: 100vh;
  padding-top: calc(var(--safe-top) + 12px);
  padding-bottom: calc(var(--safe-bottom) + 96px);
  max-width: 600px;
  margin: 0 auto;
}

.view-header { padding: 16px 20px 24px; }
.view-header h1 {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 32px;
  letter-spacing: -0.025em;
  margin: 0;
  line-height: 1.1;
}
.view-header .subtitle {
  color: var(--text-2);
  font-size: 14px;
  margin-top: 6px;
  font-weight: 500;
}

.section-label {
  padding: 4px 20px 10px;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--text-3);
  text-transform: uppercase;
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 18px;
  margin: 0 16px 12px;
}

.field { margin-bottom: 14px; }
.field:last-child { margin-bottom: 0; }
.field label {
  display: block;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 8px;
  font-weight: 700;
  font-family: var(--font-mono);
}

.input {
  width: 100%;
  background: var(--card-2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 17px;
  font-weight: 600;
  padding: 14px 16px;
  border-radius: 12px;
  outline: none;
  transition: border-color 0.15s;
  -webkit-appearance: none;
  appearance: none;
  font-feature-settings: "tnum" 1;
}
.input:focus { border-color: var(--text); }
.input.text { font-family: var(--font-body); font-weight: 500; }
input[type=date].input { font-family: var(--font-body); }

.number-input {
  display: flex;
  align-items: stretch;
  background: var(--card-2);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  height: 52px;
  width: 100%;
  min-width: 0;
}
.number-input button {
  width: 46px;
  background: transparent;
  border: none;
  color: var(--text);
  font-size: 22px;
  font-weight: 600;
  cursor: pointer;
  flex-shrink: 0;
  font-family: var(--font-mono);
  touch-action: manipulation;
}
.number-input button:active { background: var(--border); }
.number-input input {
  border: none;
  text-align: center;
  background: transparent;
  flex: 1;
  min-width: 0;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 17px;
  font-weight: 600;
  outline: none;
  -webkit-appearance: none;
  appearance: none;
  padding: 0;
}
.number-input input::placeholder { color: var(--text-3); font-weight: 500; }
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
input[type=number] { -moz-appearance: textfield; }

.exercise-row {
  background: var(--card-2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 10px;
  position: relative;
}
.exercise-row .rm-btn {
  position: absolute;
  top: 6px;
  right: 6px;
  width: 36px;
  height: 36px;
  background: transparent;
  border: none;
  color: var(--text-3);
  cursor: pointer;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
}
.exercise-row .rm-btn svg { display: block; }
.exercise-row .rm-btn:active { background: var(--border); color: var(--text); }

.name-wrap { position: relative; margin-bottom: 8px; padding-right: 32px; }
.name-input {
  width: 100%;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: var(--font-display);
  font-size: 19px;
  font-weight: 600;
  padding: 4px 0;
  outline: none;
  letter-spacing: -0.01em;
}
.name-input::placeholder { color: var(--text-3); font-weight: 500; }

.last-hint {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-3);
  margin-bottom: 12px;
  min-height: 16px;
  font-weight: 500;
  letter-spacing: 0.02em;
}
.last-hint.pr-pending { color: var(--pr); font-weight: 700; }
.last-hint .arrow { opacity: 0.6; padding: 0 6px; }

.exercise-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.exercise-stats .field { margin-bottom: 0; min-width: 0; }
.exercise-stats .field label { font-size: 10px; margin-bottom: 6px; }

.autocomplete {
  position: absolute;
  top: 100%;
  left: 0; right: 0;
  background: var(--card);
  border: 1px solid var(--border-strong);
  border-radius: 12px;
  margin-top: 6px;
  max-height: 200px;
  overflow-y: auto;
  z-index: 50;
  box-shadow: 0 12px 30px rgba(0,0,0,0.55);
}
.autocomplete-item {
  padding: 12px 14px;
  cursor: pointer;
  font-size: 15px;
  border-bottom: 1px solid var(--border);
  font-weight: 500;
}
.autocomplete-item:last-child { border-bottom: none; }
.autocomplete-item:active { background: var(--card-2); }

.btn {
  width: 100%;
  height: 56px;
  border-radius: 14px;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.005em;
  border: 1px solid transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: transform 0.08s ease-out, opacity 0.15s, background 0.15s;
  touch-action: manipulation;
  font-family: var(--font-body);
}
.btn:active { transform: scale(0.985); }
.btn:disabled { opacity: 0.5; }
.btn-primary { background: var(--ember); color: #1a0f08; box-shadow: 0 6px 18px rgba(255,106,43,0.22); }
.btn-secondary { background: var(--card-2); color: var(--text); border-color: var(--border); }
.btn-ghost { background: transparent; color: var(--text-2); height: 44px; font-weight: 500; }
.btn-danger { background: transparent; color: var(--danger); border-color: rgba(248, 113, 113, 0.4); }
.btn-danger:active { background: rgba(248, 113, 113, 0.08); }

#bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(10, 10, 11, 0.82);
  -webkit-backdrop-filter: saturate(160%) blur(22px);
  backdrop-filter: saturate(160%) blur(22px);
  border-top: 1px solid var(--border);
  padding-bottom: var(--safe-bottom);
  display: flex;
  z-index: 100;
}
.nav-btn {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text-3);
  padding: 10px 4px 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  font-family: var(--font-body);
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  transition: color 0.15s;
  cursor: pointer;
  touch-action: manipulation;
}
.nav-btn svg { width: 22px; height: 22px; stroke-width: 2; }
.nav-btn.active { color: var(--ember); }
.nav-btn:active svg { transform: scale(0.92); }

.workout-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px 18px;
  margin: 0 16px 10px;
  cursor: pointer;
  transition: transform 0.1s, border-color 0.15s, background 0.15s;
}
.workout-item:active {
  transform: scale(0.99);
  border-color: var(--border-strong);
  background: var(--card-2);
}
.workout-item .top {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 12px;
  gap: 12px;
}
.workout-item .date {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 18px;
  letter-spacing: -0.01em;
}
.workout-item .meta {
  font-family: var(--font-mono);
  font-size: 11.5px;
  color: var(--text-3);
  text-align: right;
  font-weight: 500;
  letter-spacing: 0.03em;
  flex-shrink: 0;
}
.workout-item .exercises { display: flex; flex-wrap: wrap; gap: 6px; }
.exercise-pill {
  font-size: 12.5px;
  background: var(--card-2);
  padding: 5px 10px;
  border-radius: 8px;
  font-weight: 500;
  color: var(--text-2);
  border: 1px solid var(--border);
}
.exercise-pill.has-pr {
  background: rgba(255, 178, 62, 0.10);
  color: var(--pr);
  border-color: rgba(255, 178, 62, 0.3);
  font-weight: 600;
}
.exercise-pill .num { font-family: var(--font-mono); font-weight: 600; margin-left: 2px; }

.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin: 0 16px 10px;
}
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px 16px;
  text-align: center;
}
.stat-value {
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 30px;
  letter-spacing: -0.02em;
  line-height: 1.1;
  color: var(--text);
}
.stat-value.gold { color: var(--pr); }
.stat-value.muted { color: var(--text-2); }
.stat-value .unit {
  font-size: 14px;
  color: var(--text-3);
  font-weight: 500;
  margin-left: 2px;
}
.stat-label {
  font-family: var(--font-mono);
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-3);
  font-weight: 700;
  margin-top: 8px;
}

.warning {
  background: rgba(248, 113, 113, 0.07);
  border: 1px solid rgba(248, 113, 113, 0.28);
  color: var(--danger);
  padding: 12px 16px;
  border-radius: 12px;
  margin: 0 16px 12px;
  font-size: 14px;
  font-weight: 500;
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.warning svg { flex-shrink: 0; margin-top: 1px; }

.pr-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: var(--font-mono);
  font-size: 10.5px;
  font-weight: 700;
  color: var(--pr);
  background: rgba(255, 178, 62, 0.12);
  border: 1px solid rgba(255, 178, 62, 0.35);
  padding: 3px 7px;
  border-radius: 6px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  vertical-align: middle;
  margin-left: 6px;
}

.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  -webkit-backdrop-filter: blur(8px);
  backdrop-filter: blur(8px);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  animation: fadein 0.2s;
}
.modal {
  background: var(--card);
  border-top-left-radius: 24px;
  border-top-right-radius: 24px;
  border-top: 1px solid var(--border-strong);
  padding: 16px 20px calc(20px + var(--safe-bottom));
  width: 100%;
  max-width: 600px;
  margin: 0 auto;
  animation: slideup 0.28s cubic-bezier(0.2, 0.85, 0.3, 1);
}
.modal h2 {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 600;
  margin: 8px 0 8px;
  letter-spacing: -0.01em;
}
.modal p { color: var(--text-2); margin: 0 0 20px; font-size: 15px; }
.modal-actions { display: flex; gap: 10px; }
.modal-actions .btn { flex: 1; }
.drag-handle {
  width: 40px;
  height: 4px;
  background: var(--border-strong);
  border-radius: 2px;
  margin: 0 auto 8px;
}
@keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideup { from { transform: translateY(100%); } to { transform: translateY(0); } }

.view { animation: viewenter 0.28s cubic-bezier(0.2, 0.8, 0.2, 1); }
@keyframes viewenter {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

#confetti { position: fixed; inset: 0; pointer-events: none; z-index: 300; }

.empty { text-align: center; padding: 80px 20px 40px; color: var(--text-3); }
.empty .big {
  font-family: var(--font-display);
  font-size: 22px;
  color: var(--text-2);
  margin-bottom: 6px;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.empty .small { font-size: 14px; font-weight: 500; }

.detail-section { margin: 12px 16px; }
.detail-stat-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.detail-stat-row:last-child { border-bottom: none; }
.detail-stat-row .label {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 600;
  color: var(--text-2);
}
.detail-stat-row .value {
  font-family: var(--font-mono);
  font-weight: 600;
  font-size: 16px;
}

.detail-exercise {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 10px;
}
.detail-exercise.has-pr {
  border-color: rgba(255, 178, 62, 0.4);
  background: linear-gradient(180deg, rgba(255, 178, 62, 0.04), transparent);
}
.detail-exercise .ex-name {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.detail-exercise .ex-stats {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text-2);
  margin-top: 4px;
  font-weight: 500;
  letter-spacing: 0.02em;
}
.detail-exercise .ex-stats .e1rm { color: var(--text-3); margin-left: 6px; }

.exercise-picker {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 4px 16px 16px;
  scrollbar-width: none;
}
.exercise-picker::-webkit-scrollbar { display: none; }
.exercise-pill-btn {
  flex-shrink: 0;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text-2);
  padding: 9px 14px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
  cursor: pointer;
  transition: all 0.15s;
}
.exercise-pill-btn.active {
  background: var(--ember);
  color: #1a0f08;
  border-color: var(--ember);
}

.chart-wrap {
  position: relative;
  height: 240px;
  margin: 0 16px 16px;
  padding: 14px 12px 6px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
}
.chart-wrap.tall { height: 280px; }
.chart-wrap.short { height: 200px; }

.action-stack { padding: 8px 16px; display: flex; flex-direction: column; gap: 8px; }

.back-btn {
  background: transparent;
  border: none;
  color: var(--text-2);
  padding: 4px 0;
  font-size: 14px;
  font-weight: 600;
  font-family: var(--font-body);
  display: flex;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  margin-bottom: 8px;
}
.back-btn:active { color: var(--text); }

.toast {
  position: fixed;
  bottom: calc(110px + var(--safe-bottom));
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--card-2);
  border: 1px solid var(--border-strong);
  color: var(--text);
  padding: 12px 18px;
  border-radius: 12px;
  font-weight: 600;
  font-size: 14px;
  opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
  z-index: 250;
  pointer-events: none;
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
}
.toast.gold { color: var(--pr); border-color: rgba(255, 178, 62, 0.5); }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.target-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
}
.target-row .label-block { flex: 1; min-width: 0; }
.target-row .label-block .ttl {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 16px;
}
.target-row .label-block .sub {
  font-size: 13px;
  color: var(--text-2);
  margin-top: 2px;
}
.target-row .number-input { width: 150px; flex-shrink: 0; }


/* --- exercise type selector --- */
.type-seg { display:flex; gap:6px; margin-bottom:12px; }
.type-seg button { flex:1; background:var(--bg); border:1px solid var(--border); color:var(--text-3);
  font-family:var(--font-body); font-weight:700; font-size:10.5px; letter-spacing:0.02em;
  padding:9px 3px; border-radius:9px; cursor:pointer; text-transform:uppercase; transition:all .15s; touch-action:manipulation; }
.type-seg button.active { color:var(--text); border-color:var(--border-strong); background:var(--card); }
.type-seg button[data-t="strength"].active { color:var(--ember); border-color:rgba(255,106,43,.5); }
.type-seg button[data-t="cardio"].active { color:var(--steel); border-color:rgba(111,168,199,.5); }
.type-seg button[data-t="timed"].active { color:var(--pr); border-color:rgba(255,178,62,.5); }

/* --- max-attempt toggle --- */
.max-toggle { display:flex; align-items:center; gap:10px; margin-top:10px; padding:10px 12px;
  background:var(--bg); border:1px solid var(--border); border-radius:10px; cursor:pointer; user-select:none; }
.max-toggle .box { width:22px; height:22px; border-radius:6px; border:2px solid var(--border-strong);
  flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all .15s; color:#1a0f08; }
.max-toggle .box svg { display:none; }
.max-toggle.on .box { background:var(--pr); border-color:var(--pr); }
.max-toggle.on .box svg { display:block; }
.max-toggle .lab { font-size:13px; font-weight:600; color:var(--text-2); }
.max-toggle .lab small { display:block; font-size:11px; color:var(--text-3); font-weight:500; }
.max-toggle.on .lab { color:var(--pr); }

.field.full { grid-column:1 / -1; }

/* --- history search --- */
.search-wrap { position:relative; margin:0 16px 14px; }
.search-wrap svg { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text-3); pointer-events:none; }
.search-input { width:100%; background:var(--card); border:1px solid var(--border); color:var(--text);
  font-family:var(--font-body); font-size:15px; font-weight:500; padding:13px 14px 13px 42px; border-radius:12px; outline:none; -webkit-appearance:none; }
.search-input:focus { border-color:var(--border-strong); }
.search-input::placeholder { color:var(--text-3); }

/* --- searchable exercise dropdown --- */
.ex-combo { margin: 0 16px 16px; }
.ex-combo-trigger { width:100%; display:flex; align-items:center; justify-content:space-between; gap:10px;
  background:var(--card); border:1px solid var(--border); color:var(--text);
  font-family:var(--font-display); font-weight:600; font-size:18px; letter-spacing:-0.01em;
  padding:13px 16px; border-radius:14px; cursor:pointer; -webkit-appearance:none; text-align:left; }
.ex-combo-trigger:active { background:var(--card-2); }

const CARDIO_NAMES = new Set(['bike','run','running','cycling','cycle','canoe','canoeing','kayak','kayaking','swim','swimming','walk','walking','jog','jogging','elliptical','treadmill','rowing machine','rower','erg','skierg','stairmaster','hike','hiking']);
function classifyName(name) {
  const n = (name || '').trim().toLowerCase();
  if (CARDIO_NAMES.has(n)) return 'cardio';
  if (/(plank|wall[\s-]?sit|dead[\s-]?hang|hollow[\s-]?(hold|body)|l[\s-]?sit|side[\s-]?plank|superman|isometric|static hold)/.test(n)) return 'timed';
  if (/(pull[\s-]?up|chin[\s-]?up|push[\s-]?up|\bdips?\b|leg raise|knee raise|hanging|muscle[\s-]?up)/.test(n)) return 'bodyweight';

}
// Upgrade legacy / imported entries (no `type`) into typed entries.
function migrateExercise(ex, sessionDuration) {
  if (ex && ex.type) return ex;
  const t = classifyName(ex.name);
  if (t === 'cardio') return { type: 'cardio', name: ex.name, distance: null, distanceUnit: 'km', durationMin: (sessionDuration || null) };
  if (t === 'timed') return { type: 'timed', name: ex.name, durationSec: parseInt(ex.durationSec, 10) || 0, addedWeight: parseFloat(ex.addedWeight) || 0 };

function migrateWorkouts(list) {
  if (!Array.isArray(list)) return [];

  }));
}
function normalizeExFields(ex) {
  if (ex.type === 'cardio') {
    if (ex.distance === undefined) ex.distance = null;
    if (!ex.distanceUnit) ex.distanceUnit = 'km';
    if (ex.durationMin === undefined) ex.durationMin = null;
  } else if (ex.type === 'timed') {
    if (ex.durationSec === undefined || ex.durationSec === null) ex.durationSec = '';
    if (ex.addedWeight === undefined || ex.addedWeight === null) ex.addedWeight = 0;
  } else if (ex.type === 'bodyweight') {
    if (ex.addedWeight === undefined || ex.addedWeight === null) ex.addedWeight = 0;
    if (ex.reps === undefined) ex.reps = '';

function exLoad(ex, bodyweight) {
  if (!ex || ex.type === 'cardio') return 0;
  if (ex.type === 'timed') return parseFloat(ex.addedWeight) || 0;
  if (ex.type === 'bodyweight') return (parseFloat(bodyweight) || 0) + (parseFloat(ex.addedWeight) || 0);

  if (!ex || ex.type === 'cardio' || ex.type === 'timed') return 0;

  if (load <= 0 || reps <= 0) return 0;

// Performance score for progression + PR detection (arbitrary units, NOT a kg 1RM claim).
// Uncapped weight*(1+reps/30): rising load OR rising reps both increase it.
// Holds: seconds held, lightly boosted by any added weight (a longer / heavier hold scores higher).
function perfScore(ex, bodyweight) {
  if (!ex || ex.type === 'cardio') return 0;

    const sec = parseInt(ex.durationSec, 10) || 0;
    if (sec <= 0) return 0;
    return sec * (1 + (parseFloat(ex.addedWeight) || 0) / 50);

}
// Working volume: strength (non-max) + bodyweight. Excludes cardio, holds and 1RM singles.
function workoutVolume(w) {
  let v = 0;
  for (const ex of (w.exercises || [])) {
    if (ex.type === 'cardio' || ex.type === 'timed') continue;
    if (ex.type === 'strength' && ex.isMax) continue;

}

}
function fmtPace(distance, unit, minutes) {
  const km = toKm(distance, unit), m = parseFloat(minutes) || 0;
  if (km <= 0 || m <= 0) return null;

  const mm = Math.floor(paceMin), ss = Math.round((paceMin - mm) * 60);
  const adjMm = ss === 60 ? mm + 1 : mm, adjSs = ss === 60 ? 0 : ss;
  return adjMm + ':' + String(adjSs).padStart(2, '0') + ' /km';
}
function fmtDuration(totalMin) {
  const t = Math.round(parseFloat(totalMin) || 0);

  return h > 0 ? (h + 'h ' + m + 'm') : (m + 'm');
}
// Hold time: seconds -> "M:SS" once past a minute, else "Ns".
function fmtHoldTime(sec) {
  const s = Math.round(parseFloat(sec) || 0);
  if (s < 60) return s + 's';
  return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}
function cardioSummary() {
  const map = {};
  for (const w of state.workouts) for (const ex of (w.exercises || [])) {
    if (ex.type !== 'cardio') continue;
    const k = normalizeName(ex.name);
    if (!map[k]) map[k] = { name: ex.name, sessions: 0, distKm: 0, hasDist: false, time: 0 };
    map[k].sessions++;
    if (ex.distance != null) { map[k].distKm += toKm(ex.distance, ex.distanceUnit); map[k].hasDist = true; }
    if (ex.durationMin != null) map[k].time += parseFloat(ex.durationMin) || 0;
  }
  return Object.values(map);
}
// Overall strength as an index (first qualifying session = 100). Each session, average
// how every lift's best working score moved vs that lift's previous logged value; compound it.
function strengthIndexSeries() {
  const sorted = [...state.workouts].sort((a, b) => a.date.localeCompare(b.date) || (a.id || '').localeCompare(b.id || ''));
  const last = {};
  let index = 100;
  const pts = [];
  for (const w of sorted) {
    const best = {};
    for (const ex of (w.exercises || [])) {
      if (ex.type === 'cardio') continue;
      if (ex.type === 'strength' && ex.isMax) continue; // working strength only, not test singles
      const sc = perfScore(ex, w.bodyweight);
      if (sc <= 0) continue;
      const k = normalizeName(ex.name);
      if (!k) continue;
      best[k] = Math.max(best[k] || 0, sc);
    }
    const keys = Object.keys(best);
    if (!keys.length) continue;
    const ratios = [];
    for (const k of keys) if (last[k] > 0) ratios.push(best[k] / last[k]);
    if (ratios.length) index *= ratios.reduce((s, x) => s + x, 0) / ratios.length;
    for (const k of keys) last[k] = best[k];
    pts.push({ date: w.date, index: Math.round(index * 10) / 10 });
  }
  return pts;
}

// ============================================================
// DERIVED DATA
// ============================================================
function getWeeklyStreak() {
  if (state.workouts.length === 0) return 0;
  const target = state.settings.weeklyTarget;
  const counts = {};
  for (const w of state.workouts) {
    const key = mondayKey(w.date);
    counts[key] = (counts[key] || 0) + 1;
  }
  let streak = 0;
  let cursor = getMonday(new Date());
  if ((counts[mondayKey(cursor)] || 0) >= target) streak++;
  cursor.setDate(cursor.getDate() - 7);
  while ((counts[mondayKey(cursor)] || 0) >= target) {
    streak++;
    cursor.setDate(cursor.getDate() - 7);
  }
  return streak;
}
function getCurrentWeekCount() {
  const key = mondayKey(new Date());
  return state.workouts.filter(w => mondayKey(w.date) === key).length;
}
function getDaysSinceLastWorkout() {
  if (state.workouts.length === 0) return null;
  const sorted = [...state.workouts].sort((a, b) => b.date.localeCompare(a.date));
  return daysSince(sorted[0].date);
}
function computePRs() {
  const sorted = [...state.workouts].sort((a, b) => {
    const c = a.date.localeCompare(b.date);
    return c !== 0 ? c : (a.id || '').localeCompare(b.id || '');
  });
  const best = {};
  const prs = {};
  for (const w of sorted) {
    prs[w.id] = {};
    w.exercises.forEach((ex, idx) => {
      if (ex.type === 'cardio') return;
      const key = normalizeName(ex.name);
      if (!key) return;
      const sc = perfScore(ex, w.bodyweight);
      if (sc <= 0) return;
      const prev = best[key];
      if (prev === undefined) {
        best[key] = sc;
      } else if (sc > prev) {
        prs[w.id][idx] = true;
        best[key] = sc;
      }
    });
  }
  return prs;
}
function getExerciseHistory(name) {
  const key = normalizeName(name);
  if (!key) return [];
  const out = [];
  for (const w of state.workouts) {
    w.exercises.forEach((ex, idx) => {
      if (normalizeName(ex.name) === key) {
        out.push({
          date: w.date,
          type: ex.type,
          reps: ex.reps,
          load: exLoad(ex, w.bodyweight),
          e1rm: exE1RM(ex, w.bodyweight),
          score: perfScore(ex, w.bodyweight),
          isMax: ex.type === 'strength' && !!ex.isMax,
          distance: ex.distance,
          distanceUnit: ex.distanceUnit,
          durationMin: ex.durationMin,
          durationSec: ex.durationSec,
          addedWeight: ex.addedWeight,
          workoutId: w.id,
          idx
        });
      }
    });
  }
  out.sort((a, b) => a.date.localeCompare(b.date));
  return out;
}
function getAllExerciseNames() {
  const map = new Map();
  for (const w of state.workouts) {
    for (const ex of w.exercises) {
      const key = normalizeName(ex.name);
      if (!key) continue;
      if (!map.has(key) || w.date > map.get(key).date) {
        map.set(key, { name: ex.name, date: w.date });
      }
    }
  }
  return Array.from(map.values()).map(x => x.name);
}
function getLastBodyweight() {
  const sorted = [...state.workouts].filter(w => w.bodyweight).sort((a, b) => b.date.localeCompare(a.date));
  return sorted[0]?.bodyweight || null;
}
function getMostRecentExercise(name, excludeId) {
  const key = normalizeName(name);
  if (!key) return null;
  const sorted = [...state.workouts]
    .filter(w => w.id !== excludeId)
    .sort((a, b) => b.date.localeCompare(a.date));
  for (const w of sorted) {
    for (const ex of w.exercises) {
      if (normalizeName(ex.name) === key) {
        return { ex: ex, bodyweight: w.bodyweight, date: w.date };
      }
    }
  }
  return null;
}
function getCurrentE1RMRecord(name, excludeId) {
  const hist = getExerciseHistory(name).filter(h => h.workoutId !== excludeId);
  if (hist.length === 0) return 0;
  return Math.max(...hist.map(h => h.score));
}

// ============================================================
// DOM HELPERS
// ============================================================
function el(tag, attrs, children) {
  const node = document.createElement(tag);
  if (attrs) {
    for (const k in attrs) {
      const v = attrs[k];
      if (v === undefined || v === null || v === false) continue;
      if (k === 'class') node.className = v;
      else if (k === 'style') node.setAttribute('style', v);
      else if (k === 'html') node.innerHTML = v;
      else if (k.startsWith('on') && typeof v === 'function') {
        node.addEventListener(k.slice(2).toLowerCase(), v);
      } else {
        node.setAttribute(k, v);
      }
    }
  }
  if (children !== undefined && children !== null) {
    if (Array.isArray(children)) {
      for (const c of children) {
        if (c === null || c === undefined || c === false) continue;
        node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
      }
    } else if (typeof children === 'string') {
      node.textContent = children;
    } else {
      node.appendChild(children);
    }
  }
  return node;
}

function route(view, opts) {
  opts = opts || {};
  currentView = view;
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.view === view);
  });
  const app = document.getElementById('app');
  app.innerHTML = '';
  const fns = {
    log: renderLog,
    history: renderHistory,
    progress: renderProgress,
    stats: renderStats,
    detail: () => renderDetail(opts.id)
  };
  const fn = fns[view];
  if (fn) fn();
  window.scrollTo({ top: 0, behavior: 'instant' });
}

// ============================================================
function makeField(label, inputEl) {
  return el('div', { class: 'field' }, [
    el('label', null, label),
    inputEl
  ]);
}
function makeNumberInput(opts) {
  opts = opts || {};
  const step = opts.step || 1;
  const min = opts.min;
  const max = opts.max;
  const wrap = el('div', { class: 'number-input' });
  const input = el('input', {
    type: 'number',
    step: String(step),
    inputmode: opts.inputmode || 'decimal',
    placeholder: opts.placeholder || '',
    value: (opts.value === '' || opts.value === undefined || opts.value === null) ? '' : String(opts.value)
  });
  if (min !== undefined) input.setAttribute('min', String(min));
  if (max !== undefined) input.setAttribute('max', String(max));

  const dec = el('button', { type: 'button', 'aria-label': 'Decrease' }, '\u2212');
  const inc = el('button', { type: 'button', 'aria-label': 'Increase' }, '+');

  function adj(delta) {
    const cur = parseFloat(input.value);
    const base = isNaN(cur) ? 0 : cur;
    let next = base + delta;
    if (min !== undefined) next = Math.max(min, next);
    if (max !== undefined) next = Math.min(max, next);
    input.value = stripTrailing(next);
    if (opts.onChange) opts.onChange(input.value);
  }
  dec.addEventListener('click', () => adj(-step));
  inc.addEventListener('click', () => adj(step));
  input.addEventListener('input', () => {
    if (opts.onChange) opts.onChange(input.value);
  });

  wrap.appendChild(dec);
  wrap.appendChild(input);
  wrap.appendChild(inc);
  return wrap;
}

function buildExerciseRow(ex, idx, onRemove) {
  normalizeExFields(ex);
  const row = el('div', { class: 'exercise-row' });

  const rm = el('button', { type: 'button', class: 'rm-btn', 'aria-label': 'Remove exercise', onclick: onRemove });
  rm.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>';
  row.appendChild(rm);

  // --- name + autocomplete ---
  const nameWrap = el('div', { class: 'name-wrap' });
  const nameInput = el('input', {
    class: 'name-input', type: 'text', placeholder: 'Exercise name',
    value: ex.name || '', autocomplete: 'off', autocapitalize: 'words', spellcheck: 'false'
  });
  nameWrap.appendChild(nameInput);
  let acDropdown = null;
  function hideAC() { if (acDropdown) { acDropdown.remove(); acDropdown = null; } }
  function pickName(name) { nameInput.value = name; ex.name = name; hideAC(); maybeAutoType(); updateLastHint(); saveDraft(); }
  function showAC() {
    hideAC();
    const q = (nameInput.value || '').trim().toLowerCase();
    if (!q) return;
    const matches = getAllExerciseNames().filter(n => n.toLowerCase().includes(q) && n.toLowerCase() !== q).slice(0, 5);
    if (matches.length === 0) return;
    acDropdown = el('div', { class: 'autocomplete' });
    matches.forEach(name => {
      const item = el('div', { class: 'autocomplete-item' }, name);
      item.addEventListener('mousedown', e => { e.preventDefault(); pickName(name); });
      item.addEventListener('touchstart', e => { e.preventDefault(); pickName(name); }, { passive: false });
      acDropdown.appendChild(item);
    });
    nameWrap.appendChild(acDropdown);
  }
  // If the user hasn't manually set a type, infer it from a known name (on blur / pick).
  function maybeAutoType() {
    if (ex._typeLocked || ex.type !== 'strength') return;
    const guess = classifyName(ex.name);
    if (guess !== 'strength') { ex.type = guess; normalizeExFields(ex); renderSeg(); renderFields(); }
  }
  nameInput.addEventListener('input', () => { ex.name = nameInput.value; saveDraft(); showAC(); updateLastHint(); });
  nameInput.addEventListener('focus', showAC);
  nameInput.addEventListener('blur', () => setTimeout(() => { hideAC(); maybeAutoType(); }, 180));
  row.appendChild(nameWrap);

  // --- type selector ---
  const seg = el('div', { class: 'type-seg' });
  function renderSeg() {
    seg.innerHTML = '';
    [['strength', 'Lift'], ['bodyweight', 'Bodyweight'], ['cardio', 'Cardio'], ['timed', 'Hold']].forEach(pair => {
      const t = pair[0], label = pair[1];
      const b = el('button', {
        type: 'button', 'data-t': t, class: (ex.type === t ? 'active' : ''),
        onclick: () => {
          if (ex.type === t) return;
          ex.type = t; ex._typeLocked = true;
          normalizeExFields(ex); renderSeg(); renderFields(); updateLastHint(); saveDraft();
        }
      }, label);
      seg.appendChild(b);
    });
  }
  renderSeg();
  row.appendChild(seg);

  // --- last hint (lift / bodyweight only) ---
  const lastHint = el('div', { class: 'last-hint' }, '');
  row.appendChild(lastHint);
  function updateLastHint() {
    if (ex.type === 'cardio') { lastHint.textContent = ''; lastHint.classList.remove('pr-pending'); return; }
    const recent = getMostRecentExercise(ex.name, editingWorkoutId);
    if (!recent) { lastHint.textContent = ''; lastHint.classList.remove('pr-pending'); return; }
    const r = recent.ex;
    let txt;
    if (r.type === 'bodyweight') txt = 'Last: ' + r.reps + ' reps' + (r.addedWeight ? ' +' + stripTrailing(r.addedWeight) + 'kg' : '');
    else if (r.type === 'cardio') txt = '';
    else if (r.type === 'timed') txt = 'Last: ' + fmtHoldTime(r.durationSec) + (r.addedWeight ? ' +' + stripTrailing(r.addedWeight) + 'kg' : '');
    else txt = 'Last: ' + stripTrailing(r.weight) + ' kg \u00D7 ' + r.reps + (r.isMax ? ' (1RM)' : '');
    const currentBest = getCurrentE1RMRecord(ex.name, editingWorkoutId);
    const prospective = perfScore(ex, logDraft.bodyweight);
    const willPR = prospective > 0 && prospective > currentBest;
    if (txt && willPR) lastHint.innerHTML = txt + '<span class="arrow">\u203A</span><span>PR INCOMING</span>';
    else lastHint.textContent = txt;
    lastHint.classList.toggle('pr-pending', !!(txt && willPR));
  }

  // --- type-specific fields ---
  const fieldsHost = el('div');
  row.appendChild(fieldsHost);
  function renderFields() {
    fieldsHost.innerHTML = '';
    if (ex.type === 'timed') {
      const total = parseInt(ex.durationSec, 10) || 0;
      let curMin = total ? Math.floor(total / 60) : 0;
      let curSec = total ? (total % 60) : 0;
      const holdHint = el('div', { class: 'last-hint', style: 'margin-top:10px;margin-bottom:0;' }, '');
      const refresh = () => {
        ex.durationSec = (curMin * 60 + curSec) || '';
        holdHint.textContent = (curMin * 60 + curSec) > 0
          ? ('Hold: ' + fmtHoldTime(curMin * 60 + curSec) + ((parseFloat(ex.addedWeight) || 0) ? ' \u00B7 +' + stripTrailing(ex.addedWeight) + ' kg' : ''))
          : '';
        saveDraft(); updateLastHint();
      };
      const grid = el('div', { class: 'exercise-stats' });
      grid.appendChild(el('div', { class: 'field' }, [
        el('label', null, 'Minutes'),
        makeNumberInput({ value: total ? curMin : '', step: 1, min: 0, inputmode: 'numeric', placeholder: '0', onChange: v => { curMin = parseInt(v, 10) || 0; refresh(); } })
      ]));
      grid.appendChild(el('div', { class: 'field' }, [
        el('label', null, 'Seconds'),
        makeNumberInput({ value: total ? curSec : '', step: 5, min: 0, inputmode: 'numeric', placeholder: '0', onChange: v => { curSec = parseInt(v, 10) || 0; refresh(); } })
      ]));
      fieldsHost.appendChild(grid);
      fieldsHost.appendChild(el('div', { class: 'field', style: 'margin-top:10px;' }, [
        el('label', null, 'Added wt (kg) \u00B7 optional'),
        makeNumberInput({ value: (ex.addedWeight == null || ex.addedWeight === 0) ? '' : ex.addedWeight, step: 1, min: 0, inputmode: 'decimal', placeholder: '0', onChange: v => { ex.addedWeight = (v === '' ? 0 : parseFloat(v)); refresh(); } })
      ]));
      fieldsHost.appendChild(holdHint);
      refresh();
    } else if (ex.type === 'cardio') {
      const grid = el('div', { class: 'exercise-stats' });
      grid.appendChild(el('div', { class: 'field' }, [
        el('label', null, 'Distance'),
        makeNumberInput({
          value: ex.distance == null ? '' : ex.distance, step: 0.5, min: 0, inputmode: 'decimal', placeholder: 'km',
          onChange: v => { ex.distance = (v === '' ? null : parseFloat(v)); saveDraft(); updatePace(); }
        })
      ]));
      const unitSel = el('select', { class: 'input', style: 'font-family:var(--font-body);font-weight:600;' });
      ['km', 'mi', 'm'].forEach(u => { const o = el('option', { value: u }, u); if ((ex.distanceUnit || 'km') === u) o.setAttribute('selected', ''); unitSel.appendChild(o); });
      unitSel.value = ex.distanceUnit || 'km';
      unitSel.addEventListener('change', () => { ex.distanceUnit = unitSel.value; saveDraft(); updatePace(); });
      grid.appendChild(el('div', { class: 'field' }, [el('label', null, 'Unit'), unitSel]));
      fieldsHost.appendChild(grid);
      fieldsHost.appendChild(el('div', { class: 'field', style: 'margin-top:10px;' }, [
        el('label', null, 'Duration (min)'),
        makeNumberInput({
          value: ex.durationMin == null ? '' : ex.durationMin, step: 1, min: 0, inputmode: 'numeric', placeholder: 'min',
          onChange: v => { ex.durationMin = (v === '' ? null : parseFloat(v)); saveDraft(); updatePace(); }
        })
      ]));
      const pace = el('div', { class: 'last-hint', style: 'margin-top:10px;margin-bottom:0;' }, '');
      fieldsHost.appendChild(pace);
      var updatePace = function () { const p = fmtPace(ex.distance, ex.distanceUnit || 'km', ex.durationMin); pace.textContent = p ? ('Pace ' + p) : ''; };
      updatePace();
    } else if (ex.type === 'bodyweight') {
      const grid = el('div', { class: 'exercise-stats' });
      grid.appendChild(el('div', { class: 'field' }, [
        el('label', null, 'Reps'),
        makeNumberInput({ value: ex.reps, step: 1, min: 0, inputmode: 'numeric', onChange: v => { ex.reps = v; saveDraft(); updateLastHint(); } })
      ]));
      grid.appendChild(el('div', { class: 'field' }, [
        el('label', null, 'Added wt (kg)'),
        makeNumberInput({ value: ex.addedWeight == null ? '' : ex.addedWeight, step: 1, min: 0, inputmode: 'decimal', placeholder: '0', onChange: v => { ex.addedWeight = (v === '' ? 0 : parseFloat(v)); saveDraft(); updateLastHint(); } })
      ]));
      fieldsHost.appendChild(grid);
      const bw = parseFloat(logDraft.bodyweight) || 0;
      fieldsHost.appendChild(el('div', { class: 'last-hint', style: 'margin-top:8px;margin-bottom:0;' },
        bw > 0 ? ('Logged at ' + stripTrailing(bw + (parseFloat(ex.addedWeight) || 0)) + ' kg effective') : 'Set bodyweight above to score this'));
    } else {
      const mt = el('div', { class: 'max-toggle' + (ex.isMax ? ' on' : '') });
      mt.innerHTML = '<span class="box"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></span><span class="lab">Max attempt<small>1RM test \u2014 kept out of volume &amp; working line</small></span>';
      const setMax = (val) => { ex.isMax = !!val; mt.classList.toggle('on', ex.isMax); saveDraft(); };
      mt.addEventListener('click', () => setMax(!ex.isMax));
      const grid = el('div', { class: 'exercise-stats' });
      grid.appendChild(el('div', { class: 'field' }, [
        el('label', null, 'Weight (kg)'),
        makeNumberInput({ value: ex.weight, step: 2.5, min: 0, inputmode: 'decimal', onChange: v => { ex.weight = v; saveDraft(); updateLastHint(); } })
      ]));
      grid.appendChild(el('div', { class: 'field' }, [
        el('label', null, 'Reps'),
        makeNumberInput({ value: ex.reps, step: 1, min: 0, inputmode: 'numeric', onChange: v => { ex.reps = v; if (parseInt(v, 10) === 1) setMax(true); saveDraft(); updateLastHint(); } })
      ]));
      fieldsHost.appendChild(grid);
      fieldsHost.appendChild(mt);
    }
  }
  renderFields();
  updateLastHint();
  return row;
}

function submitWorkout() {
  if (!logDraft.date) {
    showToast('Pick a date');
    return;
  }
  const bodyweight = parseFloat(logDraft.bodyweight) || 0;
  const cleaned = [];
  for (const ex of logDraft.exercises) {
    const name = (ex.name || '').trim();
    if (!name) continue;
    if (ex.type === 'timed') {
      const sec = parseInt(ex.durationSec, 10) || 0;
      if (sec <= 0) continue;
      cleaned.push({ type: 'timed', name, durationSec: sec, addedWeight: parseFloat(ex.addedWeight) || 0 });
    } else if (ex.type === 'cardio') {
      const dist = (ex.distance == null || ex.distance === '') ? null : parseFloat(ex.distance);
      const dur = (ex.durationMin == null || ex.durationMin === '') ? null : parseFloat(ex.durationMin);
      if ((!dist || dist <= 0) && (!dur || dur <= 0)) continue;
      cleaned.push({ type: 'cardio', name, distance: (dist && dist > 0) ? dist : null, distanceUnit: ex.distanceUnit || 'km', durationMin: (dur && dur > 0) ? dur : null });
    } else if (ex.type === 'bodyweight') {
      const reps = parseInt(ex.reps, 10) || 0;
      if (reps <= 0) continue;
      cleaned.push({ type: 'bodyweight', name, reps, addedWeight: parseFloat(ex.addedWeight) || 0 });
    } else {
      const reps = parseInt(ex.reps, 10) || 0;
      const weight = parseFloat(ex.weight) || 0;
      if (reps <= 0) continue;
      cleaned.push({ type: 'strength', name, weight, reps, isMax: !!ex.isMax });
    }
  }

  if (cleaned.length === 0) {
    showToast('Add an exercise with valid numbers');
    return;
  }

  const duration = parseFloat(logDraft.duration) || 0;

  const workout = {
    id: editingWorkoutId || generateId(),
    date: logDraft.date,
    duration: duration > 0 ? duration : null,
    bodyweight: bodyweight > 0 ? bodyweight : null,
    exercises: cleaned
  };

  let prCount = 0;
  if (!editingWorkoutId) {
    for (const ex of cleaned) {
      if (ex.type === 'cardio') continue;
      const best = getCurrentE1RMRecord(ex.name);
      if (perfScore(ex, bodyweight) > best) prCount++;
    }
  }

  if (editingWorkoutId) {
    const idx = state.workouts.findIndex(w => w.id === editingWorkoutId);
    if (idx >= 0) state.workouts[idx] = workout;
    editingWorkoutId = null;
    logDraft = null;
    saveState();
    showToast('Updated');
    setTimeout(() => route('detail', { id: workout.id }), 120);
  } else {
    state.workouts.push(workout);
    saveState();
    clearDraft();
    logDraft = null;
    if (prCount > 0) {
      celebratePR(prCount);
      setTimeout(() => route('history'), 800);
    } else {
      showToast('Saved');
      setTimeout(() => route('history'), 120);
    }
  }
}

// ============================================================
function renderHistory() {
  const app = document.getElementById('app');
  const view = el('div', { class: 'view' });

  view.appendChild(el('div', { class: 'view-header' }, [
    el('h1', null, 'History'),
    el('div', { class: 'subtitle' },
      state.workouts.length + ' session' + (state.workouts.length === 1 ? '' : 's') + ' logged'
    )
  ]));

  const dsl = getDaysSinceLastWorkout();
  if (dsl !== null && dsl >= 5) {
    view.appendChild(el('div', { class: 'warning' }, [
      el('span', { html: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>' }),
      el('span', null, dsl + ' days since your last session.')
    ]));
  }

  if (state.workouts.length === 0) {
    view.appendChild(el('div', { class: 'empty' }, [
      el('div', { class: 'big' }, 'Nothing logged yet'),
      el('div', { class: 'small' }, 'Tap Log to record your first session.')
    ]));
    app.appendChild(view);
    return;
  }

  const prs = computePRs();
  const sorted = [...state.workouts].sort((a, b) => b.date.localeCompare(a.date));

  // --- search ---
  const searchWrap = el('div', { class: 'search-wrap' });
  searchWrap.innerHTML = '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>';
  const searchInput = el('input', { class: 'search-input', type: 'text', placeholder: 'Search exercise or date\u2026', value: historyQuery, autocapitalize: 'none', autocomplete: 'off', spellcheck: 'false' });
  searchWrap.appendChild(searchInput);
  view.appendChild(searchWrap);

  const listHost = el('div');
  view.appendChild(listHost);

  function pill(ex, isPR) {
    if (ex.type === 'cardio') {
      const p = el('div', { class: 'exercise-pill cardio' });
      p.appendChild(document.createTextNode(ex.name));
      let detail = '';
      if (ex.distance != null) detail = ' ' + stripTrailing(ex.distance) + (ex.distanceUnit || 'km');
      else if (ex.durationMin != null) detail = ' ' + stripTrailing(ex.durationMin) + 'm';
      if (detail) p.appendChild(el('span', { class: 'num' }, detail));
      return p;
    }
    if (ex.type === 'timed') {
      const p = el('div', { class: 'exercise-pill timed' + (isPR ? ' has-pr' : '') });
      p.appendChild(document.createTextNode(ex.name));
      p.appendChild(el('span', { class: 'num' }, ' ' + fmtHoldTime(ex.durationSec) + (ex.addedWeight ? ' +' + stripTrailing(ex.addedWeight) + 'kg' : '')));
      if (isPR) p.appendChild(document.createTextNode(' \u2605'));
      return p;
    }
    const p = el('div', { class: 'exercise-pill' + (isPR ? ' has-pr' : '') });
    p.appendChild(document.createTextNode(ex.name));
    if (ex.type === 'bodyweight') {
      p.appendChild(el('span', { class: 'num' }, ' \u00D7' + ex.reps + (ex.addedWeight ? ' +' + stripTrailing(ex.addedWeight) + 'kg' : '')));
    } else {
      p.appendChild(el('span', { class: 'num' }, ' ' + stripTrailing(ex.weight) + '\u00D7' + ex.reps));
    }
    if (isPR) p.appendChild(document.createTextNode(' \u2605'));
    return p;
  }

  function matches(w, q) {
    if (!q) return true;
    if (fmtDate(w.date).toLowerCase().includes(q)) return true;
    if ((w.date || '').includes(q)) return true;
    return w.exercises.some(ex => (ex.name || '').toLowerCase().includes(q));
  }

  function renderList() {
    listHost.innerHTML = '';
    const q = historyQuery.trim().toLowerCase();
    const rows = sorted.filter(w => matches(w, q));
    if (rows.length === 0) {
      listHost.appendChild(el('div', { class: 'empty', style: 'padding:48px 20px;' }, [
        el('div', { class: 'big' }, 'No matches'),
        el('div', { class: 'small' }, 'Try a different exercise or date.')
      ]));
      return;
    }
    for (const w of rows) {
      const item = el('div', { class: 'workout-item' });
      item.addEventListener('click', () => route('detail', { id: w.id }));
      const top = el('div', { class: 'top' });
      top.appendChild(el('div', { class: 'date' }, fmtDate(w.date)));
      const metaParts = [];
      if (w.duration) metaParts.push(w.duration + ' min');
      if (w.bodyweight) metaParts.push(stripTrailing(w.bodyweight) + ' kg BW');
      metaParts.push(w.exercises.length + ' ex');
      top.appendChild(el('div', { class: 'meta' }, metaParts.join(' \u00B7 ')));
      item.appendChild(top);
      const exList = el('div', { class: 'exercises' });
      w.exercises.forEach((ex, idx) => exList.appendChild(pill(ex, !!(prs[w.id] && prs[w.id][idx]))));
      item.appendChild(exList);
      listHost.appendChild(item);
    }
  }

  searchInput.addEventListener('input', () => { historyQuery = searchInput.value; renderList(); });
  renderList();

  app.appendChild(view);
}

function renderDetail(id) {
  const app = document.getElementById('app');
  const w = state.workouts.find(x => x.id === id);
  if (!w) { route('history'); return; }

  const view = el('div', { class: 'view' });

  const header = el('div', { class: 'view-header' });
  const back = el('button', { class: 'back-btn', onclick: () => route('history') });
  back.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg> Back';
  header.appendChild(back);
  header.appendChild(el('h1', null, fmtDate(w.date)));
  header.appendChild(el('div', { class: 'subtitle' }, w.date));
  view.appendChild(header);

  const prs = computePRs();
  const wprs = prs[w.id] || {};
  const totalVolume = workoutVolume(w);
  const prCount = Object.keys(wprs).length;
  const hasCardio = w.exercises.some(e => e.type === 'cardio');

  const statsCard = el('div', { class: 'card' });
  if (w.duration) statsCard.appendChild(makeDetailRow('Duration', w.duration + ' min'));
  if (w.bodyweight) statsCard.appendChild(makeDetailRow('Bodyweight', stripTrailing(w.bodyweight) + ' kg'));
  if (totalVolume > 0) statsCard.appendChild(makeDetailRow('Working volume', stripTrailing(Math.round(totalVolume)) + ' kg'));
  statsCard.appendChild(makeDetailRow('Exercises', String(w.exercises.length)));
  if (prCount > 0) statsCard.appendChild(makeDetailRow('Personal records', prCount + ' \u2605'));
  view.appendChild(statsCard);

  view.appendChild(el('div', { class: 'section-label' }, 'EXERCISES'));
  const exSection = el('div', { class: 'detail-section', style: 'margin-top: 0;' });
  w.exercises.forEach((ex, idx) => {
    const isPR = !!wprs[idx];
    const isCardio = ex.type === 'cardio';
    const card = el('div', { class: 'detail-exercise' + (isPR ? ' has-pr' : '') + (isCardio ? ' cardio' : '') });
    const nameEl = el('div', { class: 'ex-name' });
    if (isCardio) nameEl.appendChild(el('span', { class: 'kind-tag cardio' }, 'Cardio'));
    else if (ex.type === 'timed') nameEl.appendChild(el('span', { class: 'kind-tag timed' }, 'Hold'));
    else if (ex.type === 'bodyweight') nameEl.appendChild(el('span', { class: 'kind-tag bw' }, 'BW'));
    else if (ex.isMax) nameEl.appendChild(el('span', { class: 'kind-tag max' }, '1RM'));
    nameEl.appendChild(document.createTextNode(ex.name));
    if (isPR) nameEl.appendChild(el('span', { class: 'pr-badge' }, 'PR'));
    card.appendChild(nameEl);

    const stats = el('div', { class: 'ex-stats' });
    if (isCardio) {
      const bits = [];
      if (ex.distance != null) bits.push(stripTrailing(ex.distance) + ' ' + (ex.distanceUnit || 'km'));
      if (ex.durationMin != null) bits.push(stripTrailing(ex.durationMin) + ' min');
      stats.appendChild(el('span', null, bits.join(' \u00B7 ') || '\u2014'));
      const pace = fmtPace(ex.distance, ex.distanceUnit || 'km', ex.durationMin);
      if (pace) stats.appendChild(el('span', { class: 'e1rm' }, '\u00B7 ' + pace));
    } else if (ex.type === 'timed') {
      stats.appendChild(el('span', null, fmtHoldTime(ex.durationSec) + ' hold'));
      if (ex.addedWeight) stats.appendChild(el('span', { class: 'e1rm' }, '\u00B7 +' + stripTrailing(ex.addedWeight) + ' kg'));
    } else if (ex.type === 'bodyweight') {
      const eff = exLoad(ex, w.bodyweight);
      stats.appendChild(el('span', null, ex.reps + ' reps' + (ex.addedWeight ? ' +' + stripTrailing(ex.addedWeight) + ' kg' : '')));
      if (eff > 0) stats.appendChild(el('span', { class: 'e1rm' }, '\u00B7 @ ' + stripTrailing(eff) + ' kg'));
    } else {
      stats.appendChild(el('span', null, stripTrailing(ex.weight) + ' kg \u00D7 ' + ex.reps + (ex.isMax ? '  (tested 1RM)' : '')));
    }
    card.appendChild(stats);
    exSection.appendChild(card);
  });
  view.appendChild(exSection);

  view.appendChild(el('div', { class: 'action-stack' }, [
    el('button', {
      class: 'btn btn-secondary',
      onclick: () => {
        editingWorkoutId = id;
        logDraft = null;
        route('log');
      }
    }, 'Edit session'),
    el('button', {
      class: 'btn btn-danger',
      onclick: () => confirmDelete(id)
    }, 'Delete session')
  ]));

  app.appendChild(view);
}

function makeDetailRow(label, value) {
  return el('div', { class: 'detail-stat-row' }, [
    el('div', { class: 'label' }, label),
    el('div', { class: 'value' }, value)
  ]);
}

function confirmDelete(id) {
  showModal({
    title: 'Delete this session?',
    message: 'This permanently removes the workout and any PRs it set. Cannot be undone.',
    primaryLabel: 'Delete',
    primaryClass: 'btn-danger',
    onPrimary: () => {
      state.workouts = state.workouts.filter(w => w.id !== id);
      saveState();
      route('history');
      showToast('Deleted');
    }
  });
}
