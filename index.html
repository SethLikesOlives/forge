// Searchable dropdown: tap to open a bottom sheet with a filter box + scrollable list.
function exerciseCombo(currentName, names, onPick) {
  const wrap = el('div', { class: 'ex-combo' });
  const trigger = el('button', { class: 'ex-combo-trigger', type: 'button' });
  trigger.appendChild(el('span', { class: 'cur' }, currentName));
  trigger.appendChild(el('span', { class: 'chev', html: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>' }));

  let backdrop = null;
  function close() { if (backdrop) { backdrop.remove(); backdrop = null; } }
  function open() {
    backdrop = el('div', { class: 'combo-backdrop' });
    const panel = el('div', { class: 'combo-panel' });
    const grip = el('div', { class: 'combo-grip' });
    const search = el('input', { class: 'combo-search', type: 'text', placeholder: 'Search exercises\u2026', autocapitalize: 'none', autocomplete: 'off', spellcheck: 'false' });
    const list = el('div', { class: 'combo-list' });
    function renderList() {
      list.innerHTML = '';
      const q = search.value.trim().toLowerCase();
      const shown = names.filter(n => !q || n.toLowerCase().includes(q));
      if (!shown.length) { list.appendChild(el('div', { class: 'combo-empty' }, 'No match')); return; }
      shown.forEach(n => {
        list.appendChild(el('button', {
          type: 'button',
          class: 'combo-item' + (n === currentName ? ' active' : ''),
          onclick: () => { close(); onPick(n); }
        }, n));
      });
    }
    search.addEventListener('input', renderList);
    panel.appendChild(grip);
    panel.appendChild(search);
    panel.appendChild(list);
    backdrop.appendChild(panel);
    backdrop.addEventListener('click', e => { if (e.target === backdrop) close(); });
    document.body.appendChild(backdrop);
    renderList();
    setTimeout(() => { try { search.focus(); } catch (e) {} }, 60);
  }
  trigger.addEventListener('click', open);
  wrap.appendChild(trigger);
  return wrap;
}

function renderProgress() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  const view = el('div', { class: 'view' });

  view.appendChild(el('div', { class: 'view-header' }, [
    el('h1', null, 'Progress'),
    el('div', { class: 'subtitle' }, 'Top set, strength trend & tested maxes')
  ]));

  const names = getAllExerciseNames().sort((a, b) => a.localeCompare(b));

  if (names.length === 0) {
    view.appendChild(el('div', { class: 'empty' }, [
      el('div', { class: 'big' }, 'No exercises yet'),
      el('div', { class: 'small' }, 'Log a session to see progression.')
    ]));
    app.appendChild(view);
    return;
  }

  // Default to the most recent exercise (not alphabetical)
  if (!progressSelectedExercise || !names.some(n => normalizeName(n) === normalizeName(progressSelectedExercise))) {
    const recent = [...state.workouts].sort((a, b) => b.date.localeCompare(a.date) || (b.id || '').localeCompare(a.id || ''))[0];
    const def = recent && recent.exercises && recent.exercises[0] ? recent.exercises[0].name : names[0];
    progressSelectedExercise = names.find(n => normalizeName(n) === normalizeName(def)) || names[0];
  } else {
    progressSelectedExercise = names.find(n => normalizeName(n) === normalizeName(progressSelectedExercise));
  }

  // searchable dropdown selector
  view.appendChild(exerciseCombo(progressSelectedExercise, names, function (name) {
    progressSelectedExercise = name;
    renderProgress();
  }));

  const history = getExerciseHistory(progressSelectedExercise);
  if (history.length === 0) {
    view.appendChild(el('div', { class: 'empty' }, [el('div', { class: 'big' }, 'No data')]));
    app.appendChild(view);
    return;
  }

  const isCardio = history.every(h => h.type === 'cardio');
  const isTimed = history.every(h => h.type === 'timed');
  const sessions = new Set(history.map(h => h.workoutId)).size;
  const lastDate = fmtDateShort(history[history.length - 1].date);

  if (isCardio) {
    const withDist = history.filter(h => h.distance != null);
    const totalKm = withDist.reduce((s, h) => s + toKm(h.distance, h.distanceUnit), 0);
    const totalMin = history.reduce((s, h) => s + (parseFloat(h.durationMin) || 0), 0);
    view.appendChild(el('div', { class: 'stat-grid' }, [
      el('div', { class: 'stat-card' }, [
        el('div', { class: 'stat-value gold' }, withDist.length ? [document.createTextNode(stripTrailing(Math.round(totalKm * 10) / 10)), el('span', { class: 'unit' }, ' km')] : [document.createTextNode('\u2014')]),
        el('div', { class: 'stat-label' }, 'Total distance')
      ]),
      el('div', { class: 'stat-card' }, [
        el('div', { class: 'stat-value' }, fmtDuration(totalMin)),
        el('div', { class: 'stat-label' }, 'Total time')
      ])
    ]));
    view.appendChild(el('div', { class: 'stat-grid' }, [
      el('div', { class: 'stat-card' }, [el('div', { class: 'stat-value muted' }, String(sessions)), el('div', { class: 'stat-label' }, 'Sessions')]),
      el('div', { class: 'stat-card' }, [el('div', { class: 'stat-value muted' }, lastDate), el('div', { class: 'stat-label' }, 'Last logged')])
    ]));
  } else if (isTimed) {
    const best = Math.max(0, ...history.map(h => parseInt(h.durationSec, 10) || 0));
    const prog = progressionSeries(history);
    const progVals = prog.index.filter(v => v != null);
    const gain = progVals.length ? Math.round((progVals[progVals.length - 1] - 100) * 10) / 10 : 0;
    view.appendChild(el('div', { class: 'stat-grid' }, [
      el('div', { class: 'stat-card' }, [
        el('div', { class: 'stat-value gold' }, fmtHoldTime(best)),
        el('div', { class: 'stat-label' }, 'Best hold')
      ]),
      el('div', { class: 'stat-card' }, [
        el('div', { class: 'stat-value' + (gain > 0 ? ' gold' : '') }, (gain >= 0 ? '+' : '') + gain + '%'),
        el('div', { class: 'stat-label' }, 'Hold progress')
      ])
    ]));
    view.appendChild(el('div', { class: 'stat-grid' }, [
      el('div', { class: 'stat-card' }, [el('div', { class: 'stat-value muted' }, String(sessions)), el('div', { class: 'stat-label' }, 'Sessions')]),
      el('div', { class: 'stat-card' }, [el('div', { class: 'stat-value muted' }, lastDate), el('div', { class: 'stat-label' }, 'Last logged')])
    ]));
  } else {
    const nonCardio = history.filter(h => h.type !== 'cardio');
    const maxes = nonCardio.filter(h => h.isMax);
    const heaviest = Math.max(0, ...nonCardio.map(h => h.load));
    const testedMax = maxes.length ? Math.max(...maxes.map(h => h.load)) : null;
    const prog = progressionSeries(history);
    const progVals = prog.index.filter(v => v != null);
    const gain = progVals.length ? Math.round((progVals[progVals.length - 1] - 100) * 10) / 10 : 0;

    if (testedMax != null) {
      const tCard = el('div', { class: 'card', style: 'display:flex;justify-content:space-between;align-items:center;gap:12px;' });
      tCard.appendChild(el('div', {}, [
        el('div', { style: 'font-family:var(--font-mono);font-size:10.5px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-3);font-weight:700;' }, 'Tested 1RM'),
        el('div', { style: 'font-size:12.5px;color:var(--text-2);margin-top:3px;' }, 'Best logged max-effort single')
      ]));
      tCard.appendChild(el('div', { style: 'font-family:var(--font-mono);font-weight:700;font-size:26px;color:var(--pr);' }, [document.createTextNode(stripTrailing(testedMax)), el('span', { style: 'font-size:13px;color:var(--text-3);font-weight:500;' }, ' kg')]));
      view.appendChild(tCard);
    }

    view.appendChild(el('div', { class: 'stat-grid' }, [
      el('div', { class: 'stat-card' }, [
        el('div', { class: 'stat-value gold' }, [document.createTextNode(stripTrailing(heaviest)), el('span', { class: 'unit' }, ' kg')]),
        el('div', { class: 'stat-label' }, 'Heaviest set')
      ]),
      el('div', { class: 'stat-card' }, [
        el('div', { class: 'stat-value' + (gain > 0 ? ' gold' : '') }, (gain >= 0 ? '+' : '') + gain + '%'),
        el('div', { class: 'stat-label' }, 'Strength gain')
      ])
    ]));
    view.appendChild(el('div', { class: 'stat-grid' }, [
      el('div', { class: 'stat-card' }, [el('div', { class: 'stat-value muted' }, String(sessions)), el('div', { class: 'stat-label' }, 'Sessions')]),
      el('div', { class: 'stat-card' }, [el('div', { class: 'stat-value muted' }, lastDate), el('div', { class: 'stat-label' }, 'Last logged')])
    ]));
  }

  const charts = [];
  function addChart(label, drawFn, caption) {
    if (label) view.appendChild(el('div', { class: 'section-label' }, label));
    const wrap = el('div', { class: 'chart-wrap short' });
    const canvas = el('canvas');
    wrap.appendChild(canvas);
    view.appendChild(wrap);
    if (caption) view.appendChild(el('div', { style: 'text-align:center;color:var(--text-3);font-size:11px;font-family:var(--font-mono);letter-spacing:0.03em;padding:0 16px 8px;margin-top:-4px;' }, caption));
    charts.push(() => drawFn(canvas));
  }

  // primary charts (always shown), in priority order
  if (isCardio) {
    const c = history.filter(h => h.type === 'cardio');
    if (c.some(h => h.distance != null)) addChart('DISTANCE (KM)', cv => drawCardioDistance(cv, history));
    if (c.some(h => h.durationMin != null)) addChart('DURATION (MIN)', cv => drawCardioDuration(cv, history));
  } else if (isTimed) {
    addChart('HOLD TIME', cv => drawHoldTime(cv, history), 'Longest hold each session');
  } else {
    addChart('STRENGTH PROGRESSION', cv => drawStrengthProgression(cv, history), '100 = first session \u00B7 weight & reps combined');
    addChart('MAX WEIGHT MOVED', cv => drawTopSet(cv, history));
  }

  // "More graphs" dropdown — secondary views on demand
  const hasAddedLoad = isTimed && history.some(h => (parseFloat(h.addedWeight) || 0) > 0);
  const moreOptions = isCardio
    ? [{ key: 'pace', label: 'Pace (min/km)' }, { key: 'frequency', label: 'Training frequency' }]
    : isTimed
      ? (hasAddedLoad ? [{ key: 'addedload', label: 'Added load (kg)' }, { key: 'frequency', label: 'Training frequency' }] : [{ key: 'frequency', label: 'Training frequency' }])
      : [{ key: 'reps', label: 'Reps (top set)' }, { key: 'volume', label: 'Session volume' }, { key: 'intensity', label: 'Relative intensity' }, { key: 'frequency', label: 'Training frequency' }];
  if (!moreOptions.some(o => o.key === progressMore)) progressMore = '';

  const moreSel = el('select', { class: 'more-select' });
  moreSel.appendChild(el('option', { value: '' }, 'More graphs\u2026'));
  moreOptions.forEach(o => {
    const opt = el('option', { value: o.key }, o.label);
    if (o.key === progressMore) opt.selected = true;
    moreSel.appendChild(opt);
  });
  const moreHost = el('div', { class: 'more-host' });
  const drawers = {
    reps: cv => drawReps(cv, history),
    volume: cv => drawSessionVolume(cv, history),
    intensity: cv => drawIntensity(cv, history),
    frequency: cv => drawFrequency(cv, history),
    pace: cv => drawPace(cv, history),
    addedload: cv => drawAddedLoad(cv, history)
  };
  function showMore(key) {
    moreHost.innerHTML = '';
    if (!key || !drawers[key]) return;
    if (key === 'intensity' && !history.some(h => h.isMax)) {
      moreHost.appendChild(el('div', { class: 'more-note' }, 'Log a 1-rep max test for this lift to see your working sets as a % of it.'));
      return;
    }
    if (key === 'pace' && !history.some(h => h.type === 'cardio' && h.distance != null && h.durationMin != null)) {
      moreHost.appendChild(el('div', { class: 'more-note' }, 'Needs sessions logged with both distance and time.'));
      return;
    }
    const wrap = el('div', { class: 'chart-wrap short' });
    const canvas = el('canvas');
    wrap.appendChild(canvas);
    moreHost.appendChild(wrap);
    if (typeof Chart !== 'undefined') drawers[key](canvas);
    else wrap.innerHTML = '<div style="text-align:center;color:var(--text-3);padding:54px 20px;font-size:13px;">Charts need an internet connection on first load.</div>';
  }
  moreSel.addEventListener('change', () => { progressMore = moreSel.value; showMore(progressMore); });
  view.appendChild(moreSel);
  view.appendChild(moreHost);

  app.appendChild(view);

  if (typeof Chart !== 'undefined') {
    charts.forEach(fn => fn());
  } else {
    view.querySelectorAll('.chart-wrap').forEach(wr => { wr.innerHTML = '<div style="text-align:center;color:var(--text-3);padding:54px 20px;font-size:13px;">Charts need an internet connection on first load.</div>'; });
  }
  showMore(progressMore);
}

function liftSeries(history) {
  const byDate = {};
  history.forEach(h => {
    if (h.type === 'cardio') return;
    const d = h.date;
    if (!byDate[d]) byDate[d] = { work: null, workReps: null, e1: null, max: null };
    if (h.isMax) {
      if (byDate[d].max == null || h.load > byDate[d].max) byDate[d].max = h.load;
    } else {
      const r = parseInt(h.reps, 10) || 0;
      if (byDate[d].work == null || h.load > byDate[d].work || (h.load === byDate[d].work && r > (byDate[d].workReps || 0))) {
        byDate[d].work = h.load; byDate[d].workReps = r;
      }
      if (byDate[d].e1 == null || h.e1rm > byDate[d].e1) byDate[d].e1 = h.e1rm;
    }
  });
  const dates = Object.keys(byDate).sort();
  return {
    labels: dates.map(fmtDateShort),
    work: dates.map(d => byDate[d].work),
    reps: dates.map(d => byDate[d].workReps),
    e1: dates.map(d => byDate[d].e1 == null ? null : Math.round(byDate[d].e1 * 10) / 10),
    maxP: dates.map(d => byDate[d].max)
  };
}

function drawTopSet(canvas, history) {
  const s = liftSeries(history);
  const ds = [{ label: 'Max weight (kg)', data: s.work, borderColor: '#FF6A2B', backgroundColor: 'rgba(255,106,43,0.10)', borderWidth: 2, tension: 0.25, fill: true, pointRadius: 4, pointHoverRadius: 6, pointBackgroundColor: '#FF6A2B', pointBorderWidth: 0, spanGaps: true }];
  if (s.maxP.some(v => v != null)) ds.push({ label: 'Tested 1RM', data: s.maxP, showLine: false, pointRadius: 7, pointHoverRadius: 9, pointStyle: 'rectRot', pointBackgroundColor: '#FFB23E', pointBorderColor: '#141110', pointBorderWidth: 2.5, spanGaps: true });
  new Chart(canvas, { type: 'line', data: { labels: s.labels, datasets: ds }, options: chartOptions() });
}

function progressionSeries(history) {
  const byDate = {};
  history.forEach(h => {
    if (h.type === 'cardio') return;
    const sc = h.score || 0;
    if (sc <= 0) return;
    const d = h.date;
    if (!byDate[d]) byDate[d] = { work: null, any: null };
    byDate[d].any = Math.max(byDate[d].any || 0, sc);
    if (!h.isMax) byDate[d].work = Math.max(byDate[d].work || 0, sc);
  });
  const dates = Object.keys(byDate).sort();
  const hasWork = dates.some(d => byDate[d].work != null);
  const pick = d => hasWork ? byDate[d].work : byDate[d].any;
  let firstScore = null;
  for (const d of dates) { const v = pick(d); if (v != null && v > 0) { firstScore = v; break; } }
  return {
    labels: dates.map(fmtDateShort),
    index: dates.map(d => { const v = pick(d); return (v != null && firstScore) ? Math.round((100 * v / firstScore) * 10) / 10 : null; })
  };
}

function drawStrengthProgression(canvas, history) {
  const s = progressionSeries(history);
  const base = s.labels.map(() => 100);
  new Chart(canvas, { type: 'line', data: { labels: s.labels, datasets: [
    { label: 'Strength', data: s.index, borderColor: '#FF6A2B', backgroundColor: 'rgba(255,106,43,0.10)', borderWidth: 2, tension: 0.25, fill: true, pointRadius: 3, pointHoverRadius: 5, pointBackgroundColor: '#FF6A2B', pointBorderWidth: 0, spanGaps: true },
    { label: 'Baseline (100)', data: base, borderColor: 'rgba(237,230,222,0.3)', borderDash: [4, 4], borderWidth: 1.5, pointRadius: 0, fill: false }
  ] }, options: chartOptions() });
}

function drawReps(canvas, history) {
  const s = liftSeries(history);
  const o = chartOptions();
  o.scales.y = Object.assign({}, o.scales.y, { beginAtZero: true });
  o.scales.y.ticks = Object.assign({}, o.scales.y.ticks, { precision: 0 });
  new Chart(canvas, { type: 'line', data: { labels: s.labels, datasets: [
    { label: 'Reps', data: s.reps, borderColor: '#6FA8C7', backgroundColor: 'rgba(111,168,199,0.10)', borderWidth: 2, tension: 0.25, fill: true, pointRadius: 3, pointHoverRadius: 5, pointBackgroundColor: '#6FA8C7', pointBorderWidth: 0, spanGaps: true }
  ] }, options: o });
}

function drawCardioDistance(canvas, history) {
  const c = history.filter(h => h.type === 'cardio').sort((a, b) => a.date.localeCompare(b.date));
  const labels = c.map(h => fmtDateShort(h.date));
  const dist = c.map(h => h.distance == null ? null : Math.round(toKm(h.distance, h.distanceUnit) * 100) / 100);
  new Chart(canvas, { type: 'line', data: { labels, datasets: [
    { label: 'Distance (km)', data: dist, borderColor: '#6FA8C7', backgroundColor: 'rgba(111,168,199,0.12)', borderWidth: 2, tension: 0.25, fill: true, pointRadius: 4, pointHoverRadius: 6, pointBackgroundColor: '#6FA8C7', pointBorderWidth: 0, spanGaps: true }
  ] }, options: chartOptions() });
}

function drawCardioDuration(canvas, history) {
  const c = history.filter(h => h.type === 'cardio').sort((a, b) => a.date.localeCompare(b.date));
  const labels = c.map(h => fmtDateShort(h.date));
  const dur = c.map(h => h.durationMin == null ? null : parseFloat(h.durationMin));
  const o = chartOptions();
  o.scales.y = Object.assign({}, o.scales.y, { beginAtZero: true });
  new Chart(canvas, { type: 'line', data: { labels, datasets: [
    { label: 'Duration (min)', data: dur, borderColor: '#EDE6DE', backgroundColor: 'rgba(237,230,222,0.06)', borderWidth: 2, tension: 0.25, fill: true, pointRadius: 3, pointHoverRadius: 5, pointBackgroundColor: '#EDE6DE', pointBorderWidth: 0, spanGaps: true }
  ] }, options: o });
}

// Total work for this lift per session: sum of working sets' weight x reps (excludes 1RM tests).
function drawSessionVolume(canvas, history) {
  const byDate = {};
  history.forEach(h => {
    if (h.type === 'cardio' || h.isMax) return;
    const v = (h.load || 0) * (parseInt(h.reps, 10) || 0);
    if (v <= 0) return;
    byDate[h.date] = (byDate[h.date] || 0) + v;
  });
  const dates = Object.keys(byDate).sort();
  const labels = dates.map(fmtDateShort);
  const data = dates.map(d => Math.round(byDate[d]));
  const o = chartOptions();
  o.scales.y = Object.assign({}, o.scales.y, { beginAtZero: true });
  new Chart(canvas, { type: 'bar', data: { labels, datasets: [
    { label: 'Volume (kg)', data, backgroundColor: 'rgba(255,106,43,0.55)', borderColor: '#FF6A2B', borderWidth: 1.5, borderRadius: 4, maxBarThickness: 46 }
  ] }, options: o });
}

// Top working set as a % of your best tested 1RM.
function drawIntensity(canvas, history) {
  const maxes = history.filter(h => h.isMax).map(h => h.load).filter(v => v > 0);
  const tested = maxes.length ? Math.max(...maxes) : null;
  const byDate = {};
  history.forEach(h => {
    if (h.type === 'cardio' || h.isMax) return;
    if (!(h.load > 0)) return;
    if (byDate[h.date] == null || h.load > byDate[h.date]) byDate[h.date] = h.load;
  });
  const dates = Object.keys(byDate).sort();
  const labels = dates.map(fmtDateShort);
  const data = dates.map(d => tested ? Math.round((byDate[d] / tested) * 1000) / 10 : null);
  const o = chartOptions();
  o.scales.y = Object.assign({}, o.scales.y, { beginAtZero: true, suggestedMax: 100 });
  o.scales.y.ticks = Object.assign({}, o.scales.y.ticks, { callback: v => v + '%' });
  new Chart(canvas, { type: 'line', data: { labels, datasets: [
    { label: '% of tested 1RM', data, borderColor: '#FFB23E', backgroundColor: 'rgba(255,178,62,0.10)', borderWidth: 2, tension: 0.25, fill: true, pointRadius: 3, pointHoverRadius: 5, pointBackgroundColor: '#FFB23E', pointBorderWidth: 0, spanGaps: true }
  ] }, options: o });
}

// How many sessions per week included this exercise.
function drawFrequency(canvas, history) {
  const weeks = {};
  history.forEach(h => {
    const k = mondayKey(h.date);
    if (!weeks[k]) weeks[k] = new Set();
    weeks[k].add(h.workoutId);
  });
  const keys = Object.keys(weeks).sort();
  const labels = keys.map(k => fmtDateShort(k));
  const data = keys.map(k => weeks[k].size);
  const o = chartOptions();
  o.scales.y = Object.assign({}, o.scales.y, { beginAtZero: true });
  o.scales.y.ticks = Object.assign({}, o.scales.y.ticks, { precision: 0 });
  new Chart(canvas, { type: 'bar', data: { labels, datasets: [
    { label: 'Sessions / week', data, backgroundColor: 'rgba(111,168,199,0.55)', borderColor: '#6FA8C7', borderWidth: 1.5, borderRadius: 4, maxBarThickness: 46 }
  ] }, options: o });
}

// Cardio pace (min/km) per session — lower is faster.
function drawPace(canvas, history) {
  const c = history.filter(h => h.type === 'cardio' && h.distance != null && h.durationMin != null)
    .sort((a, b) => a.date.localeCompare(b.date));
  const labels = c.map(h => fmtDateShort(h.date));
  const data = c.map(h => {
    const km = toKm(h.distance, h.distanceUnit), m = parseFloat(h.durationMin) || 0;
    return km > 0 && m > 0 ? Math.round((m / km) * 100) / 100 : null;
  });
  new Chart(canvas, { type: 'line', data: { labels, datasets: [
    { label: 'Pace (min/km)', data, borderColor: '#6FA8C7', backgroundColor: 'rgba(111,168,199,0.10)', borderWidth: 2, tension: 0.25, fill: true, pointRadius: 4, pointHoverRadius: 6, pointBackgroundColor: '#6FA8C7', pointBorderWidth: 0, spanGaps: true }
  ] }, options: chartOptions() });
}

// Longest hold each session (seconds), axis + tooltip formatted as M:SS.
function drawHoldTime(canvas, history) {
  const byDate = {};
  history.forEach(h => {
    if (h.type !== 'timed') return;
    const s = parseInt(h.durationSec, 10) || 0;
    if (s <= 0) return;
    if (byDate[h.date] == null || s > byDate[h.date]) byDate[h.date] = s;
  });
  const dates = Object.keys(byDate).sort();
  const labels = dates.map(fmtDateShort);
  const data = dates.map(d => byDate[d]);
  const o = chartOptions();
  o.scales.y = Object.assign({}, o.scales.y, { beginAtZero: true });
  o.scales.y.ticks = Object.assign({}, o.scales.y.ticks, { callback: v => fmtHoldTime(v) });
  o.plugins = Object.assign({}, o.plugins);
  o.plugins.tooltip = Object.assign({}, o.plugins.tooltip, { callbacks: { label: ctx => ' ' + fmtHoldTime(ctx.parsed.y) } });
  new Chart(canvas, { type: 'line', data: { labels, datasets: [
    { label: 'Hold time', data, borderColor: '#FFB23E', backgroundColor: 'rgba(255,178,62,0.12)', borderWidth: 2, tension: 0.25, fill: true, pointRadius: 4, pointHoverRadius: 6, pointBackgroundColor: '#FFB23E', pointBorderWidth: 0, spanGaps: true }
  ] }, options: o });
}

// Heaviest added load per session for weighted holds.
function drawAddedLoad(canvas, history) {
  const byDate = {};
  history.forEach(h => {
    if (h.type !== 'timed') return;
    const s = parseInt(h.durationSec, 10) || 0;
    if (s <= 0) return;
    const wt = parseFloat(h.addedWeight) || 0;
    if (byDate[h.date] == null || wt > byDate[h.date]) byDate[h.date] = wt;
  });
  const dates = Object.keys(byDate).sort();
  const labels = dates.map(fmtDateShort);
  const data = dates.map(d => byDate[d]);
  const o = chartOptions();
  o.scales.y = Object.assign({}, o.scales.y, { beginAtZero: true });
  new Chart(canvas, { type: 'bar', data: { labels, datasets: [
    { label: 'Added load (kg)', data, backgroundColor: 'rgba(255,178,62,0.5)', borderColor: '#FFB23E', borderWidth: 1.5, borderRadius: 4, maxBarThickness: 46 }
  ] }, options: o });
}

function chartOptions(extra) {
  const base = {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { intersect: false, mode: 'index' },
    plugins: {
      legend: {
        labels: {
          color: '#9A8F84',
          font: { family: 'Manrope', size: 11, weight: '600' },
          boxWidth: 12,
          boxHeight: 8,
          padding: 14,
          usePointStyle: true
        }
      },
      tooltip: {
        backgroundColor: '#272220',
        titleColor: '#EDE6DE',
        bodyColor: '#9A8F84',
        borderColor: '#4A4039',
        borderWidth: 1,
        padding: 10,
        cornerRadius: 8,
        titleFont: { family: 'Manrope', weight: '600', size: 12 },
        bodyFont: { family: 'JetBrains Mono', size: 12 }
      }
    },
    scales: {
      x: {
        ticks: {
          color: '#6B625B',
          font: { family: 'JetBrains Mono', size: 10 },
          maxRotation: 0,
          autoSkipPadding: 12
        },
        grid: { color: 'rgba(255,255,255,0.04)' }
      },
      y: {
        ticks: {
          color: '#6B625B',
          font: { family: 'JetBrains Mono', size: 11 }
        },
        grid: { color: 'rgba(255,255,255,0.04)' }
      }
    }
  };
  return Object.assign(base, extra || {});
}

// ============================================================
// STATS VIEW
// ============================================================
function renderStats() {
  const app = document.getElementById('app');
  const view = el('div', { class: 'view' });

  view.appendChild(el('div', { class: 'view-header' }, [
    el('h1', null, 'Stats'),
    el('div', { class: 'subtitle' }, 'Streak, volume, bodyweight')
  ]));

  const streak = getWeeklyStreak();
  const weekCount = getCurrentWeekCount();
  const target = state.settings.weeklyTarget;
  const totalSessions = state.workouts.length;
  const dsl = getDaysSinceLastWorkout();
  const totalMin = state.workouts.reduce((s, w) => s + (parseFloat(w.duration) || 0), 0);
  const totalVol = state.workouts.reduce((s, w) => s + workoutVolume(w), 0);
  const volWorkouts = state.workouts.filter(w => workoutVolume(w) > 0);

  view.appendChild(el('div', { class: 'stat-grid' }, [
    el('div', { class: 'stat-card' }, [
      el('div', { class: 'stat-value gold' }, String(streak)),
      el('div', { class: 'stat-label' }, 'Week streak')
    ]),
    el('div', { class: 'stat-card' }, [
      el('div', { class: 'stat-value' }, weekCount + '/' + target),
      el('div', { class: 'stat-label' }, 'This week')
    ])
  ]));

  view.appendChild(el('div', { class: 'stat-grid' }, [
    el('div', { class: 'stat-card' }, [
      el('div', { class: 'stat-value muted' }, String(totalSessions)),
      el('div', { class: 'stat-label' }, 'Total sessions')
    ]),
    el('div', { class: 'stat-card' }, [
      el('div', { class: 'stat-value muted' }, dsl === null ? '\u2014' : String(dsl)),
      el('div', { class: 'stat-label' }, 'Days since last')
    ])
  ]));

  view.appendChild(el('div', { class: 'stat-grid' }, [
    el('div', { class: 'stat-card' }, [
      el('div', { class: 'stat-value' }, fmtDuration(totalMin)),
      el('div', { class: 'stat-label' }, 'Time trained')
    ]),
    el('div', { class: 'stat-card' }, [
      el('div', { class: 'stat-value' }, totalVol >= 1000
        ? [document.createTextNode((Math.round(totalVol / 100) / 10).toString()), el('span', { class: 'unit' }, 'k kg')]
        : [document.createTextNode(stripTrailing(Math.round(totalVol))), el('span', { class: 'unit' }, ' kg')]),
      el('div', { class: 'stat-label' }, 'Total volume')
    ])
  ]));

  // Weekly target setter
  const targetCard = el('div', { class: 'card' });
  const targetRow = el('div', { class: 'target-row' }, [
    el('div', { class: 'label-block' }, [
      el('div', { class: 'ttl' }, 'Weekly target'),
      el('div', { class: 'sub' }, 'Sessions per week to keep streak')
    ]),
    makeNumberInput({
      value: target, step: 1, min: 1, max: 14, inputmode: 'numeric',
      onChange: v => {
        const n = parseInt(v, 10);
        if (n >= 1) {
          state.settings.weeklyTarget = n;
          saveState();
          // re-render stat cards' streak/week count if needed
          const stat = document.querySelectorAll('.stat-value')[1];
          if (stat) stat.textContent = getCurrentWeekCount() + '/' + n;
          const streakStat = document.querySelectorAll('.stat-value')[0];
          if (streakStat) streakStat.textContent = String(getWeeklyStreak());
          wkFill.style.width = Math.min(100, n ? (getCurrentWeekCount() / n) * 100 : 0) + '%';
        }
      }
    })
  ]);
  const wkBar = el('div', { class: 'wk-bar' });
  const wkFill = el('div', { class: 'fill', style: 'width:' + Math.min(100, target ? (weekCount / target) * 100 : 0) + '%' });
  wkBar.appendChild(wkFill);
  targetCard.appendChild(targetRow);
  targetCard.appendChild(wkBar);
  view.appendChild(targetCard);

  // Strength index (overall progression)
  const siSeries = strengthIndexSeries();
  let siCanvas = null;
  if (siSeries.length >= 2) {
    const firstV = siSeries[0].index, lastV = siSeries[siSeries.length - 1].index;
    const overall = Math.round((lastV - firstV) * 10) / 10;
    const perSession = Math.round(((Math.pow(lastV / firstV, 1 / (siSeries.length - 1)) - 1) * 100) * 10) / 10;
    view.appendChild(el('div', { class: 'section-label' }, 'STRENGTH INDEX'));
    const sumCard = el('div', { class: 'card', style: 'display:flex;justify-content:space-between;align-items:center;gap:12px;' });
    sumCard.appendChild(el('div', {}, [
      el('div', { style: 'font-family:var(--font-mono);font-size:10.5px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-3);font-weight:700;' }, (overall >= 0 ? '+' : '') + overall + '% since first session'),
      el('div', { style: 'font-size:12.5px;color:var(--text-2);margin-top:3px;' }, 'Avg ' + (perSession >= 0 ? '+' : '') + perSession + '%/session across all lifts')
    ]));
    sumCard.appendChild(el('div', { style: 'font-family:var(--font-mono);font-weight:700;font-size:26px;color:var(--ember);' }, String(lastV)));
    view.appendChild(sumCard);
    const siWrap = el('div', { class: 'chart-wrap short' });
    siCanvas = el('canvas');
    siWrap.appendChild(siCanvas);
    view.appendChild(siWrap);
    view.appendChild(el('div', { style: 'text-align:center;color:var(--text-3);font-size:11px;font-family:var(--font-mono);letter-spacing:0.03em;padding:0 16px 8px;margin-top:-4px;' }, '100 = first session \u00B7 each point averages how every lift moved vs its last time'));
  }

  // Volume chart (working volume only: excludes cardio & 1RM singles)
  let volCanvas = null;
  if (volWorkouts.length > 0) {
    view.appendChild(el('div', { class: 'section-label' }, 'WORKING VOLUME PER SESSION'));
    const volWrap = el('div', { class: 'chart-wrap' });
    volCanvas = el('canvas');
    volWrap.appendChild(volCanvas);
    view.appendChild(volWrap);
  }

  // Bodyweight chart
  const bwData = state.workouts.filter(w => w.bodyweight).sort((a, b) => a.date.localeCompare(b.date));
  let bwCanvas = null;
  if (bwData.length > 0) {
    view.appendChild(el('div', { class: 'section-label' }, 'BODYWEIGHT'));
    const bwWrap = el('div', { class: 'chart-wrap' });
    bwCanvas = el('canvas');
    bwWrap.appendChild(bwCanvas);
    view.appendChild(bwWrap);
  }

  // Cardio summary
  const cardio = cardioSummary();
  if (cardio.length) {
    view.appendChild(el('div', { class: 'section-label' }, 'CARDIO'));
    const cc = el('div', { class: 'card' });
    cardio.forEach(c => {
      const bits = [];
      if (c.hasDist) bits.push(stripTrailing(Math.round(c.distKm * 10) / 10) + ' km');
      if (c.time > 0) bits.push(fmtDuration(c.time));
      bits.push(c.sessions + '\u00D7');
      cc.appendChild(el('div', { class: 'cardio-row' }, [
        el('div', { class: 'nm' }, c.name),
        el('div', { class: 'val' }, bits.join('  \u00B7  '))
      ]));
    });
    view.appendChild(cc);
  }

  // Backup
  const dataCard = el('div', { class: 'card' });
  dataCard.appendChild(el('div', {
    style: 'font-family: var(--font-display); font-weight: 600; font-size: 16px; margin-bottom: 4px; letter-spacing: -0.005em;'
  }, 'Backup'));
  dataCard.appendChild(el('div', {
    style: 'font-size: 13px; color: var(--text-2); margin-bottom: 14px;'
  }, 'Export and re-import your data so a cleared browser cache never loses anything.'));
  dataCard.appendChild(el('button', {
    class: 'btn btn-secondary', style: 'margin-bottom: 8px;',
    onclick: exportData
  }, 'Export data (JSON)'));
  dataCard.appendChild(el('button', {
    class: 'btn btn-secondary',
    onclick: importData
  }, 'Import data'));
  view.appendChild(dataCard);

  view.appendChild(el('div', {
    style: 'text-align: center; color: var(--text-3); font-size: 11px; padding: 24px 16px 12px; font-family: var(--font-mono); letter-spacing: 0.08em;'
  }, 'FORGE \u00B7 v2'));

  app.appendChild(view);

  // Charts after attached
  if (typeof Chart === 'undefined') return;

  if (siCanvas) {
    const labels = siSeries.map(p => fmtDateShort(p.date));
    const data = siSeries.map(p => p.index);
    const base100 = siSeries.map(() => 100);
    new Chart(siCanvas, {
      type: 'line',
      data: {
        labels,
        datasets: [
          { label: 'Strength index', data: data, borderColor: '#FF6A2B', backgroundColor: 'rgba(255,106,43,0.10)', borderWidth: 2, tension: 0.25, fill: true, pointRadius: 3, pointHoverRadius: 5, pointBackgroundColor: '#FF6A2B', pointBorderWidth: 0 },
          { label: 'Baseline (100)', data: base100, borderColor: 'rgba(237,230,222,0.3)', borderDash: [4, 4], borderWidth: 1.5, pointRadius: 0, fill: false }
        ]
      },
      options: chartOptions()
    });
  }

  if (volCanvas) {
    const sorted = [...volWorkouts].sort((a, b) => a.date.localeCompare(b.date)).slice(-20);
    new Chart(volCanvas, {
      type: 'bar',
      data: {
        labels: sorted.map(w => fmtDateShort(w.date)),
        datasets: [{
          label: 'Working volume (kg)',
          data: sorted.map(w => Math.round(workoutVolume(w))),

          borderRadius: 4,
          maxBarThickness: 22
        }]
      },
      options: chartOptions({
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#272220',
            titleColor: '#EDE6DE',
            bodyColor: '#9A8F84',
            borderColor: '#4A4039',
            borderWidth: 1,
            padding: 10,
            cornerRadius: 8
          }
        }
      })
    });
  }

  if (bwCanvas) {
    new Chart(bwCanvas, {
      type: 'line',
      data: {
        labels: bwData.map(w => fmtDateShort(w.date)),
        datasets: [{
          label: 'Bodyweight (kg)',
          data: bwData.map(w => w.bodyweight),
          borderColor: '#FFB23E',
          backgroundColor: 'rgba(255,178,62,0.08)',
          borderWidth: 2,
          tension: 0.3,
          fill: true,
          pointRadius: 3,
          pointBackgroundColor: '#FFB23E',
          pointBorderWidth: 0
        }]
      },
      options: chartOptions({
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#272220',
            titleColor: '#EDE6DE',
            bodyColor: '#9A8F84',
            borderColor: '#4A4039',
            borderWidth: 1,
            padding: 10,
            cornerRadius: 8
          }
        }
      })
    });
  }
}

// ============================================================
// EXPORT / IMPORT
// ============================================================
function exportData() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'forge-backup-' + todayISO() + '.json';
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 100);
  showToast('Exported');
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'application/json,.json';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      const parsed = JSON.parse(text);
      if (!parsed || !Array.isArray(parsed.workouts)) throw new Error('Invalid format');
      showModal({
        title: 'Import data?',
        message: 'Replace current data with ' + parsed.workouts.length + ' session' + (parsed.workouts.length === 1 ? '' : 's') + ' from this backup? Your current data will be overwritten.',
        primaryLabel: 'Replace',
        primaryClass: 'btn-primary',
        onPrimary: () => {
          state = {
            workouts: migrateWorkouts(parsed.workouts),
            settings: Object.assign({ weeklyTarget: 3 }, parsed.settings || {})
          };
          saveState();
          progressSelectedExercise = null;
          route('stats');
          showToast('Imported');
        }
      });
    } catch (err) {
      showToast('Invalid file');
    }
  };
  input.click();
}

// ============================================================
// MODAL + TOAST
// ============================================================
function showModal(opts) {
  const backdrop = el('div', { class: 'modal-backdrop' });
  const modal = el('div', { class: 'modal' });
  modal.appendChild(el('div', { class: 'drag-handle' }));
  modal.appendChild(el('h2', null, opts.title));
  if (opts.message) modal.appendChild(el('p', null, opts.message));
  const actions = el('div', { class: 'modal-actions' });
  actions.appendChild(el('button', {
    class: 'btn btn-secondary',
    onclick: () => backdrop.remove()
  }, opts.secondaryLabel || 'Cancel'));
  actions.appendChild(el('button', {
    class: 'btn ' + (opts.primaryClass || 'btn-primary'),
    onclick: () => {
      backdrop.remove();
      if (opts.onPrimary) opts.onPrimary();
    }
  }, opts.primaryLabel));
  modal.appendChild(actions);
  backdrop.appendChild(modal);
  backdrop.addEventListener('click', e => { if (e.target === backdrop) backdrop.remove(); });
  document.body.appendChild(backdrop);
}

let toastTimer = null;
function showToast(msg, gold) {
  let toast = document.getElementById('toast');
  if (!toast) {
    toast = el('div', { id: 'toast', class: 'toast' });
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.classList.toggle('gold', !!gold);
  // Force reflow then add show class
  void toast.offsetWidth;
  toast.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    toast.classList.remove('show');
  }, 2000);
}

// ============================================================
// PR CELEBRATION
// ============================================================
function celebratePR(prCount) {
  haptic();
  confetti();
  showToast(prCount === 1 ? 'NEW PR \u2605' : prCount + ' NEW PRS \u2605', true);
}

function haptic() {
  try { if (navigator.vibrate) navigator.vibrate([60, 30, 60, 30, 140]); } catch (e) {}
}

function confetti() {
  let canvas = document.getElementById('confetti');
  if (!canvas) {
    canvas = el('canvas', { id: 'confetti' });
    document.body.appendChild(canvas);
  }
  const dpr = window.devicePixelRatio || 1;
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const particles = [];
  const colors = ['#FF6A2B', '#FFB23E', '#FFD9A0', '#EDE6DE'];
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight * 0.42;
  for (let i = 0; i < 90; i++) {
    particles.push({
      x: cx + (Math.random() - 0.5) * 60,
      y: cy,
      vx: (Math.random() - 0.5) * 14,
      vy: (Math.random() - 1) * 18 - 4,
      size: Math.random() * 6 + 3,
      color: colors[Math.floor(Math.random() * colors.length)],
      rot: Math.random() * Math.PI,
      vrot: (Math.random() - 0.5) * 0.3,
      life: 1
    });
  }
  let frame = 0;
  function tick() {
    ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
    let alive = false;
    for (const p of particles) {
      if (p.life <= 0) continue;
      alive = true;
      p.vy += 0.6;
      p.vx *= 0.99;
      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.vrot;
      p.life -= 0.012;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    }
    frame++;
    if (alive && frame < 220) requestAnimationFrame(tick);
    else { ctx.clearRect(0, 0, window.innerWidth, window.innerHeight); canvas.remove(); }
  }
  tick();
}

const ICON_STATS = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V10M10 20V4M16 20v-8M22 20H2"/></svg>';

function init() {
  loadState();

  const nav = document.getElementById('bottom-nav');
  const items = [
    { id: 'log', label: 'Log', icon: ICON_LOG },
    { id: 'history', label: 'History', icon: ICON_HISTORY },
    { id: 'progress', label: 'Progress', icon: ICON_PROGRESS },
    { id: 'stats', label: 'Stats', icon: ICON_STATS }
  ];
  items.forEach(item => {
    const btn = el('button', {
      class: 'nav-btn', 'data-view': item.id,
      onclick: () => {
        // Discard in-flight edit when leaving log
        if (currentView === 'log' && editingWorkoutId && item.id !== 'log') {
          editingWorkoutId = null;
          logDraft = null;
        }
        // Clear edit state when entering log via tab
        if (item.id === 'log' && editingWorkoutId) {
          editingWorkoutId = null;
          logDraft = null;
        }
        route(item.id);
      }
    });
    btn.innerHTML = item.icon + '<span>' + item.label + '</span>';
    nav.appendChild(btn);
  });

  route('log');

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW registration failed:', err));
  }
}

document.addEventListener('DOMContentLoaded', init);
